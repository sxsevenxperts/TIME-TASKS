<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Tasks — Calendário Inteligente</title>
    <meta name="description" content="Time Tasks é um aplicativo de calendário inteligente com visão semanal, gerenciamento de eventos e interface premium." />
    <meta name="theme-color" content="#5856D6" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app" class="app-layout">
      <!-- ========== SIDEBAR ========== -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar__header">
          <div class="sidebar__logo">
            <svg class="sidebar__logo-icon" viewBox="0 0 32 32" fill="none">
              <rect width="32" height="32" rx="8" fill="var(--color-primary)"/>
              <path d="M8 12h16M8 16h10M8 20h13" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
              <circle cx="24" cy="20" r="4" fill="#fff" opacity="0.9"/>
              <path d="M24 18.5v1.5l1 1" stroke="var(--color-primary)" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span class="sidebar__logo-text">Time Tasks</span>
          </div>
          <button id="theme-toggle" class="btn-icon" aria-label="Alternar tema" title="Alternar tema">
            <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>

        <button id="btn-new-event" class="btn-primary sidebar__new-event">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="18" height="18">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Novo Evento
        </button>

        <div id="mini-calendar" class="mini-calendar">
          <div class="mini-calendar__header">
            <button id="mini-cal-prev" class="btn-icon btn-icon--sm" aria-label="Mês anterior">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="16" height="16"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span id="mini-cal-title" class="mini-calendar__title"></span>
            <button id="mini-cal-next" class="btn-icon btn-icon--sm" aria-label="Próximo mês">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="16" height="16"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <div class="mini-calendar__grid">
            <div class="mini-calendar__weekdays">
              <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
            </div>
            <div id="mini-cal-days" class="mini-calendar__days"></div>
          </div>
        </div>

        <div class="sidebar__calendars">
          <h3 class="sidebar__section-title">Meus Calendários</h3>
          <div id="calendar-list" class="calendar-list"></div>
        </div>
      </aside>

      <!-- ========== MAIN CONTENT ========== -->
      <main class="main-content">
        <!-- Header -->
        <header class="main-header">
          <div class="main-header__left">
            <button id="sidebar-toggle" class="btn-icon main-header__menu" aria-label="Menu">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="20" height="20">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
              </svg>
            </button>
            <button id="btn-today" class="btn-secondary">Hoje</button>
            <div class="main-header__nav">
              <button id="btn-prev" class="btn-icon" aria-label="Anterior">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <button id="btn-next" class="btn-icon" aria-label="Próximo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="18" height="18"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
            <h1 id="current-date-title" class="main-header__title"></h1>
          </div>
          <div class="main-header__right">
            <div id="view-selector" class="view-selector">
              <button class="view-selector__btn" data-view="day">Dia</button>
              <button class="view-selector__btn" data-view="3day">3 Dias</button>
              <button class="view-selector__btn active" data-view="week">Semana</button>
              <button class="view-selector__btn" data-view="month">Mês</button>
            </div>
          </div>
        </header>

        <!-- Calendar Grid -->
        <div id="calendar-container" class="calendar-container">
          <!-- All-day events row -->
          <div id="allday-row" class="allday-row">
            <div class="time-gutter allday-gutter">
              <span>Dia todo</span>
            </div>
            <div id="allday-cells" class="allday-cells"></div>
          </div>

          <!-- Scrollable time grid -->
          <div id="time-grid-scroll" class="time-grid-scroll">
            <div id="time-grid" class="time-grid">
              <div class="time-gutter" id="time-labels"></div>
              <div id="day-columns" class="day-columns"></div>
              <!-- Now indicator -->
              <div id="now-indicator" class="now-indicator">
                <div class="now-indicator__dot"></div>
                <div class="now-indicator__line"></div>
              </div>
            </div>
          </div>

          <!-- Month view (hidden by default) -->
          <div id="month-grid" class="month-grid" style="display:none;"></div>
        </div>
      </main>
    </div>

    <!-- ========== EVENT MODAL ========== -->
    <div id="event-modal" class="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-labelledby="modal-title">
        <div class="modal__header">
          <h2 id="modal-title" class="modal__title">Novo Evento</h2>
          <button id="modal-close" class="btn-icon" aria-label="Fechar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="20" height="20">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <form id="event-form" class="modal__form">
          <div class="form-group">
            <input type="text" id="event-title" class="form-input form-input--title" placeholder="Adicionar título" required autocomplete="off" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="event-date" class="form-label">Data</label>
              <input type="date" id="event-date" class="form-input" required />
            </div>
            <div class="form-group">
              <label class="form-label">
                <input type="checkbox" id="event-allday" class="form-checkbox" />
                Dia inteiro
              </label>
            </div>
          </div>

          <div id="time-inputs" class="form-row">
            <div class="form-group">
              <label for="event-start" class="form-label">Início</label>
              <input type="time" id="event-start" class="form-input" value="09:00" />
            </div>
            <div class="form-group">
              <label for="event-end" class="form-label">Fim</label>
              <input type="time" id="event-end" class="form-input" value="10:00" />
            </div>
          </div>

          <div class="form-group">
            <label for="event-calendar" class="form-label">Calendário</label>
            <select id="event-calendar" class="form-select">
              <option value="pessoal">Pessoal</option>
              <option value="trabalho">Trabalho</option>
              <option value="saude">Saúde</option>
              <option value="estudos">Estudos</option>
              <option value="social">Social</option>
            </select>
          </div>

          <div class="form-group">
            <label for="event-description" class="form-label">Descrição</label>
            <textarea id="event-description" class="form-input form-textarea" rows="3" placeholder="Adicionar descrição..."></textarea>
          </div>

          <input type="hidden" id="event-id" />

          <div class="modal__actions">
            <button type="button" id="btn-delete-event" class="btn-danger" style="display:none;">Excluir</button>
            <div class="modal__actions-right">
              <button type="button" id="btn-cancel" class="btn-secondary">Cancelar</button>
              <button type="submit" class="btn-primary">Salvar</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- ========== EVENT PREVIEW POPOVER ========== -->
    <div id="event-popover" class="event-popover" aria-hidden="true">
      <div class="event-popover__header">
        <div id="popover-color" class="event-popover__color"></div>
        <h3 id="popover-title" class="event-popover__title"></h3>
        <button id="popover-close" class="btn-icon btn-icon--sm" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="16" height="16">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="event-popover__body">
        <div class="event-popover__row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="popover-datetime"></span>
        </div>
        <div id="popover-desc-row" class="event-popover__row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
          <span id="popover-description"></span>
        </div>
      </div>
      <div class="event-popover__actions">
        <button id="popover-edit" class="btn-secondary btn-secondary--sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
          Editar
        </button>
        <button id="popover-delete" class="btn-danger btn-danger--sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Excluir
        </button>
      </div>
    </div>

    <!-- ========== TOAST ========== -->
    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
